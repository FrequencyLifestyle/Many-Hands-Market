<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360" role="img" aria-label="A carved harvest roundel: a low golden sun behind a bound sheaf of wheat, with the Many Hands heart tucked into the binding tie.">
  <title>Wheat-Sheaf &amp; Low-Sun Hero Roundel — the heart bound in the tie</title>

  <defs>
    <filter id="wsr-grain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" values="0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.10  0 0 0 0.08 0"/>
    </filter>
    <clipPath id="wsr-clip"><circle cx="180" cy="182" r="148"/></clipPath>

    <!-- ONE carved wheat ear, drawn pointing up around origin (0,0) at the top of a stem.
         Cream grains, green carved outline + central vein; paired teardrops climb the spike,
         topped by awns. Reused & rotated per stalk so the sheaf reads instantly as WHEAT. -->
    <g id="wsr-ear">
      <!-- awns / bristles at the crown -->
      <g stroke="#3D4D34" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
        <path d="M0 -34 C -1 -48 -3 -58 -6 -68"/>
        <path d="M0 -34 C 1 -48 3 -58 6 -68"/>
        <path d="M0 -34 C 0 -50 0 -60 0 -72"/>
        <path d="M-2 -30 C -7 -42 -11 -50 -16 -58"/>
        <path d="M2 -30 C 7 -42 11 -50 16 -58"/>
      </g>
      <!-- central spine of the ear -->
      <path d="M0 0 C 0 -12 0 -24 0 -35" fill="none" stroke="#3D4D34" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
      <!-- paired grain teardrops, climbing the spike (bottom widest → tip) -->
      <g fill="#FBF6EB" stroke="#3D4D34" stroke-width="1.5" stroke-linejoin="round">
        <!-- crown grain -->
        <path d="M0 -35 C -5 -42 -5 -50 0 -55 C 5 -50 5 -42 0 -35 Z"/>
        <!-- pair 1 -->
        <path d="M-1 -27 C -10 -33 -13 -42 -10 -50 C -2 -45 0 -36 -1 -27 Z"/>
        <path d="M1 -27 C 10 -33 13 -42 10 -50 C 2 -45 0 -36 1 -27 Z"/>
        <!-- pair 2 -->
        <path d="M-1 -15 C -11 -21 -15 -31 -12 -40 C -3 -34 -1 -25 -1 -15 Z"/>
        <path d="M1 -15 C 11 -21 15 -31 12 -40 C 3 -34 1 -25 1 -15 Z"/>
        <!-- pair 3 (base, widest) -->
        <path d="M-1 -3 C -12 -9 -16 -20 -13 -30 C -3 -23 -1 -13 -1 -3 Z"/>
        <path d="M1 -3 C 12 -9 16 -20 13 -30 C 3 -23 1 -13 1 -3 Z"/>
      </g>
      <!-- tiny carved score lines down each grain for the linocut bite -->
      <g stroke="#3D4D34" stroke-width="0.9" stroke-linecap="round" opacity="0.45">
        <path d="M0 -52 L 0 -38" fill="none"/>
        <path d="M-7 -46 L -3 -32" fill="none"/><path d="M7 -46 L 3 -32" fill="none"/>
        <path d="M-9 -36 L -4 -20" fill="none"/><path d="M9 -36 L 4 -20" fill="none"/>
        <path d="M-10 -26 L -4 -8" fill="none"/><path d="M10 -26 L 4 -8" fill="none"/>
      </g>
    </g>
  </defs>

  <!-- ===== roundel ground ===== -->
  <circle cx="180" cy="182" r="148" fill="#FBF6EB"/>
  <path d="M180 35.5 C 256 35 326 104 327.5 181 C 329 259 257 329 180 328.5 C 103 329 33 258 32.5 182 C 31 105 104 36 180 35.5 Z"
        fill="none" stroke="#3D4D34" stroke-width="3.4" stroke-linecap="round" opacity="0.92"/>
  <path d="M180 44 C 250 44 316 109 318 181 C 320 254 252 320 180 320 C 109 320 41 254 42 182 C 43 112 110 44 180 44 Z"
        fill="none" stroke="#3D4D34" stroke-width="1.3" stroke-linecap="round" opacity="0.45"/>

  <g clip-path="url(#wsr-clip)">
   <g transform="translate(0,6)">

    <!-- ===== LOW HARVEST SUN (behind the sheaf) ===== -->
    <g>
      <!-- long rays radiating from the disc centre, fanning above the horizon -->
      <g stroke="#D9826A" stroke-width="6.2" stroke-linecap="round" opacity="0.92">
        <line x1="63"  y1="221" x2="108" y2="244"/>
        <line x1="84"  y1="186" x2="120" y2="221"/>
        <line x1="118" y1="161" x2="142" y2="204"/>
        <line x1="297" y1="221" x2="252" y2="244"/>
        <line x1="276" y1="186" x2="240" y2="221"/>
        <line x1="242" y1="161" x2="218" y2="204"/>
      </g>
      <!-- short flicker rays -->
      <g stroke="#D9826A" stroke-width="3.6" stroke-linecap="round" opacity="0.6">
        <line x1="74"  y1="204" x2="112" y2="231"/>
        <line x1="100" y1="172" x2="130" y2="211"/>
        <line x1="286" y1="204" x2="248" y2="231"/>
        <line x1="260" y1="172" x2="230" y2="211"/>
      </g>

      <!-- dashed cream halo + faint terracotta echo -->
      <circle cx="180" cy="266" r="66" fill="none" stroke="#FBF6EB" stroke-width="3.6"
              stroke-linecap="round" stroke-dasharray="2 13" opacity="0.95"/>
      <circle cx="180" cy="266" r="66" fill="none" stroke="#C0573B" stroke-width="1.1"
              stroke-linecap="round" stroke-dasharray="2 13" opacity="0.45"/>

      <!-- the low disc, hand-wobbled -->
      <path d="M180 222 C 207 222 229 243 229 269 C 229 296 207 317 180 317 C 152 317 131 295 131 269 C 131 243 152 222 180 222 Z"
            fill="#C0573B"/>
      <path d="M160 243 C 172 237 191 237 201 244" fill="none" stroke="#D9826A"
            stroke-width="3.2" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- ===== STEMS (drawn first, ears placed on top) ===== -->
    <g fill="none" stroke-linecap="round">
      <!-- outer L --><path d="M180 254 C 156 230 140 200 132 158" stroke="#FBF6EB" stroke-width="5"/>
      <path d="M180 254 C 156 230 140 200 132 158" stroke="#3D4D34" stroke-width="1" opacity="0.5"/>
      <!-- outer R --><path d="M180 254 C 204 230 220 200 228 158" stroke="#FBF6EB" stroke-width="5"/>
      <path d="M180 254 C 204 230 220 200 228 158" stroke="#3D4D34" stroke-width="1" opacity="0.5"/>
      <!-- inner L --><path d="M180 254 C 168 224 162 188 161 146" stroke="#FBF6EB" stroke-width="5.3"/>
      <path d="M180 254 C 168 224 162 188 161 146" stroke="#3D4D34" stroke-width="1" opacity="0.5"/>
      <!-- inner R --><path d="M180 254 C 192 224 198 188 199 146" stroke="#FBF6EB" stroke-width="5.3"/>
      <path d="M180 254 C 192 224 198 188 199 146" stroke="#3D4D34" stroke-width="1" opacity="0.5"/>
      <!-- centre --><path d="M180 254 C 180 220 180 178 180 132" stroke="#FBF6EB" stroke-width="5.6"/>
      <path d="M180 254 C 180 220 180 178 180 132" stroke="#3D4D34" stroke-width="1.1" opacity="0.55"/>
    </g>

    <!-- ===== WHEAT EARS (one carved ear per stem, splayed like a fan) ===== -->
    <use href="#wsr-ear" x="0" y="0" transform="translate(132,158) rotate(-19) scale(0.92)"/>
    <use href="#wsr-ear" x="0" y="0" transform="translate(228,158) rotate(19) scale(0.92)"/>
    <use href="#wsr-ear" x="0" y="0" transform="translate(161,146) rotate(-9) scale(0.98)"/>
    <use href="#wsr-ear" x="0" y="0" transform="translate(199,146) rotate(9) scale(0.98)"/>
    <use href="#wsr-ear" x="0" y="0" transform="translate(180,132) rotate(0) scale(1.04)"/>

    <!-- ===== TERRACOTTA RUNNING-STITCH BINDING ===== -->
    <!-- soft band so the heart reads as tucked-in -->
    <path d="M150 244 C 168 238 192 238 210 244 C 210 262 210 262 210 262 C 192 268 168 268 150 262 Z"
          fill="#C0573B" opacity="0.15"/>
    <!-- two carved cord wraps -->
    <path d="M149 243 C 169 236 191 236 211 243" fill="none" stroke="#C0573B" stroke-width="6.4" stroke-linecap="round"/>
    <path d="M150 263 C 170 257 190 257 210 263" fill="none" stroke="#C0573B" stroke-width="6.4" stroke-linecap="round"/>
    <!-- running stitch over the cord -->
    <path d="M150 253 C 170 246 190 246 210 253" fill="none" stroke="#C0573B"
          stroke-width="3.3" stroke-linecap="round" stroke-dasharray="7 6"/>
    <path d="M150 253 C 170 246 190 246 210 253" fill="none" stroke="#FBF6EB"
          stroke-width="1.2" stroke-linecap="round" stroke-dasharray="7 6" opacity="0.55"/>
    <!-- loose twine ends -->
    <path d="M205 260 C 218 266 224 276 220 286" fill="none" stroke="#C0573B" stroke-width="3.3" stroke-linecap="round"/>
    <path d="M158 262 C 148 269 145 278 149 287" fill="none" stroke="#C0573B" stroke-width="2.9" stroke-linecap="round" opacity="0.85"/>

    <!-- ===== CANONICAL BRAND HEART, BOUND IN THE TIE ===== -->
    <!-- exact brand path (vb 0 0 64 64): pink fill #E8B8B0, paper stroke #FBF6EB -->
    <g transform="translate(157.6,225.6) scale(0.7) rotate(-3 32 32)">
      <path d="M 32,52 C 32,52 12,38 12,24 C 12,16 19,11 25,11 C 28,11 31,13 32,16 C 33,13 36,11 39,11 C 45,11 52,16 52,24 C 52,38 32,52 32,52 Z"
            fill="#2B241D" opacity="0.12" transform="translate(1.5,2)"/>
      <path d="M 32,52 C 32,52 12,38 12,24 C 12,16 19,11 25,11 C 28,11 31,13 32,16 C 33,13 36,11 39,11 C 45,11 52,16 52,24 C 52,38 32,52 32,52 Z"
            fill="#E8B8B0" stroke="#FBF6EB" stroke-width="3" stroke-linejoin="round"/>
    </g>

   </g>
  </g>

  <!-- grain over the whole roundel -->
  <circle cx="180" cy="182" r="148" fill="transparent" filter="url(#wsr-grain)" style="mix-blend-mode:multiply" opacity="0.5"/>
</svg>